    <style>
      :root {
        --primary: #00e5ff;
        --primary-dim: rgba(0, 229, 255, 0.12);
        --primary-glow: rgba(0, 229, 255, 0.8);
        --bg-dark: #030611;
        --glass-bg: rgba(8, 18, 36, 0.35);
        --glass-border: rgba(0, 229, 255, 0.2);
        --accent-orange: #ffaa00;
        --accent-pink: #ff0055;
        --accent-purple: #a600ff;
        --accent-green: #00ff66;
      }

      /* Dynamically overridden colors for themes */
      .theme-cyan {
        --primary: #00e5ff;
        --primary-dim: rgba(0, 229, 255, 0.12);
        --primary-glow: rgba(0, 229, 255, 0.7);
        --glass-border: rgba(0, 229, 255, 0.18);
      }
      .theme-amber {
        --primary: var(--accent-orange);
        --primary-dim: rgba(255, 170, 0, 0.12);
        --primary-glow: rgba(255, 170, 0, 0.7);
        --glass-border: rgba(255, 170, 0, 0.18);
      }
      .theme-purple {
        --primary: var(--accent-purple);
        --primary-dim: rgba(166, 0, 255, 0.12);
        --primary-glow: rgba(166, 0, 255, 0.7);
        --glass-border: rgba(166, 0, 255, 0.18);
      }
      .theme-emerald {
        --primary: var(--accent-green);
        --primary-dim: rgba(0, 255, 102, 0.12);
        --primary-glow: rgba(0, 255, 102, 0.7);
        --glass-border: rgba(0, 255, 102, 0.18);
      }

      body, html { 
        margin: 0; padding: 0; width: 100%; height: 100%; 
        overflow: hidden; background-color: var(--bg-dark); 
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        color: #fff;
        cursor: none !important; /* Force hide default cursor everywhere */
      }

      /* CRT Grid Scanline Overlay */
      #crt-overlay {
        position: absolute; inset: 0; z-index: 50; pointer-events: none;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.12) 50%);
        background-size: 100% 4px; box-shadow: inset 0 0 100px rgba(0,0,0,0.95);
        transform: translateZ(0);
      }

      /* Liquid Glass Panels with Reflection Sheen sliding animation */
      .glass-panel {
        background: var(--glass-bg);
        backdrop-filter: blur(25px) saturate(180%);
        -webkit-backdrop-filter: blur(25px) saturate(180%);
        border: 1px solid var(--glass-border);
        box-shadow: 0 15px 45px 0 rgba(0, 0, 0, 0.6), inset 0 0 25px rgba(255, 255, 255, 0.02);
        border-radius: 20px;
        transition: border-color 0.4s, box-shadow 0.4s;
        position: relative;
        will-change: transform;
      }

      /* Sliding Glass Reflection Sheen */
      .glass-panel::after {
        content: '';
        position: absolute;
        top: 0; left: -150%;
        width: 50%; height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.06), transparent);
        transform: skewX(-25deg);
        transition: 0.9s;
        pointer-events: none;
      }
      .glass-panel:hover::after {
        left: 150%;
        transition: 1.2s cubic-bezier(0.25, 1, 0.5, 1);
      }

      /* Background Warp Grid Canvas */
      #bg-canvas {
        position: absolute; inset: 0; z-index: 1; pointer-events: none;
        opacity: 0.85; transition: opacity 0.5s;
      }

      /* Global Header Navigation */
      header {
        display: flex; justify-content: space-between; align-items: center;
        padding: 25px 40px; position: relative; z-index: 10;
        border-bottom: 1px solid rgba(0, 229, 255, 0.08);
        transition: border-color 0.4s;
      }
      .logo-group { display: flex; flex-direction: column; }
      .logo-title { font-size: 26px; font-weight: 900; letter-spacing: 5px; color: #fff; margin: 0; text-shadow: 0 0 10px rgba(255,255,255,0.1); }
      .logo-subtitle { font-size: 11px; font-weight: 700; letter-spacing: 6px; color: var(--primary); text-transform: uppercase; margin-top: 3px; transition: color 0.4s;}
      
      .badge-group { display: flex; gap: 20px; align-items: center; }
      .maker-badge {
        font-family: 'Segoe UI', sans-serif; font-size: 13px; font-weight: 800; letter-spacing: 2px;
        color: #fff; background: linear-gradient(135deg, var(--accent-pink), var(--primary));
        padding: 8px 20px; border-radius: 30px; box-shadow: 0 0 15px rgba(0, 229, 255, 0.25);
        transition: box-shadow 0.4s, background 0.4s;
      }

      /* Theme Customizer Panel */
      .config-panel {
        background: rgba(10, 25, 45, 0.5); border: 1px solid var(--glass-border);
        border-radius: 30px; padding: 5px; display: flex; gap: 8px;
        backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      }
      .theme-dot {
        width: 18px; height: 18px; border-radius: 50%; cursor: none !important;
        border: 2px solid transparent; transition: transform 0.2s, border-color 0.2s;
      }
      .theme-dot:hover { transform: scale(1.25); }
      .theme-dot.active { border-color: #fff; transform: scale(1.15); }
      .dot-cyan { background: #00e5ff; }
      .dot-amber { background: var(--accent-orange); }
      .dot-purple { background: var(--accent-purple); }
      .dot-emerald { background: var(--accent-green); }

      /* --- Main Selection Portal --- */
      #portal-screen {
        position: absolute; inset: 0; display: flex; flex-direction: column;
        justify-content: center; align-items: center; z-index: 5;
        padding: 80px 40px 40px; box-sizing: border-box;
        background: radial-gradient(circle at center, rgba(12, 24, 48, 0.75) 0%, var(--bg-dark) 100%);
      }
      .portal-title {
        font-size: 34px; font-weight: 300; letter-spacing: 9px; text-transform: uppercase;
        margin-bottom: 50px; text-align: center; color: #fff;
        text-shadow: 0 0 20px var(--primary-glow);
        transition: text-shadow 0.4s;
      }

      /* Tiles Responsive Grid - Expanded for 3 Items */
      .tiles-grid {
        display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 30px; width: 100%; max-width: 850px;
        perspective: 1200px; /* Enable depth for 3D tilts */
      }

      /* Glass Interactive Game Card Tiles */
      .game-tile {
        cursor: none !important; position: relative; overflow: hidden;
        padding: 45px 15px; display: flex; flex-direction: column; align-items: center; text-align: center;
        border: 1px solid var(--glass-border);
        transform-style: preserve-3d;
        transform: rotateX(0deg) rotateY(0deg);
        will-change: transform;
      }
      .game-tile::before {
        content: ''; position: absolute; inset: 0; z-index: -1;
        background: linear-gradient(135deg, rgba(255,255,255,0.06), transparent);
        transition: opacity 0.3s;
      }
      .game-tile:hover {
        border-color: var(--primary);
        box-shadow: 0 20px 50px var(--primary-dim);
      }

      /* 3D Elements Inside Cards */
      .tile-icon {
        width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
        background: rgba(0, 229, 255, 0.08); border: 2px solid var(--primary-dim); margin-bottom: 20px;
        transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), border-color 0.4s, background 0.4s;
        transform: translateZ(40px); /* High separation lift */
      }
      .crazy-cars-tile .tile-icon {
        background: rgba(255, 170, 0, 0.08); border-color: rgba(255, 170, 0, 0.25);
      }
      .hollow-knight-tile .tile-icon {
        background: rgba(166, 0, 255, 0.08); border-color: rgba(166, 0, 255, 0.25);
      }
      .game-tile:hover .tile-icon { transform: translateZ(60px) scale(1.15) rotate(12deg); }

      .tile-title { 
        font-size: 20px; font-weight: 800; letter-spacing: 2px; margin: 0; text-transform: uppercase; color: #fff;
        transform: translateZ(30px);
        transition: text-shadow 0.4s;
      }
      .crazy-cars-tile .tile-title { text-shadow: 0 0 15px rgba(255, 170, 0, 0.5); }
      .fortzone-tile .tile-title { text-shadow: 0 0 15px var(--primary-glow); }
      .hollow-knight-tile .tile-title { text-shadow: 0 0 15px rgba(166, 0, 255, 0.5); }

      /* --- Main Active Game Container Screen --- */
      #active-game-container {
        position: absolute; inset: 0; z-index: 15; display: none; background: #000;
      }
      #game-frame { width: 100%; height: 100%; border: none; background: #000; }
      
      /* Global HUD Back Button */
      #hud-back-btn {
        position: absolute; top: 20px; left: 20px; z-index: 100;
        padding: 10px 22px; background: rgba(0, 0, 0, 0.65); backdrop-filter: blur(15px);
        border: 1px solid var(--glass-border); border-radius: 8px;
        font-family: 'Courier New', monospace; font-size: 11px; font-weight: bold;
        color: #fff; cursor: none !important; text-transform: uppercase; letter-spacing: 2px;
        transition: all 0.2s; box-shadow: 0 0 12px rgba(0, 0, 0, 0.6);
      }
      #hud-back-btn:hover { border-color: var(--primary); color: var(--primary); box-shadow: 0 0 20px var(--primary-glow); transform: scale(1.03); }

      /* --- Splash Screens --- */
      #splash-container {
        position: absolute; inset: 0; background-color: var(--bg-dark); 
        display: flex; justify-content: center; align-items: center; z-index: 40;
        transition: opacity 0.8s ease; will-change: opacity;
      }
      .splash-screen {
        position: absolute; opacity: 0; transform: scale(0.95);
        transition: opacity 0.6s ease, transform 1.5s cubic-bezier(0.1, 1, 0.3, 1);
        text-align: center; color: white; will-change: transform, opacity;
      }
      .splash-screen.active { opacity: 1; transform: scale(1.02); }
      .splash-title { font-size: 2.5rem; font-weight: 300; letter-spacing: 12px; text-transform: uppercase; }
      .splash-subtitle { font-size: 1rem; letter-spacing: 6px; color: var(--primary); margin-top: 10px; text-transform: uppercase; font-weight: bold; transition: color 0.4s;}
      .saket-text { font-size: 4rem; font-weight: 900; letter-spacing: 15px; color: #fff; text-shadow: 2px 2px 0px var(--primary), -2px -2px 0px #ff0055; transition: text-shadow 0.4s; }

      /* --- High-Performance Custom Cursor Canvas Overlay --- */
      #cursor-canvas {
        position: fixed;
        inset: 0;
        z-index: 99999;
        pointer-events: none;
        will-change: transform;
      }
    </style>

    <script>
    // ==============================================================================
    // GLOBAL STATE VARIABLES (DECLARED FIRST TO ELIMINATE INITIALIZATION ERRORS)
    // ==============================================================================
    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;
    let lastMouseX = mouseX;
    let lastMouseY = mouseY;
    let mouseSpeed = 0; // Speed of mouse calculations
    let isSessionActive = false; // Freeze rendering on active games to save CPU/GPU
    let splashSequenceDone = false;

    // Smoothed target coordinate variables declared globally (prevents any jerky snapping)
    let targetMouseX = mouseX;
    let targetMouseY = mouseY;

    // Advanced Slingshot Velocity-Push Variables
    let mouseVx = 0;
    let mouseVy = 0;
    const slingshotInertiaFactor = 8.5; // Upgraded for extreme forward-thrust slingshot actions!

    // Advanced Verlet and Elastic Spring-Mass variables for the Cursor Droplet
    let innerX = window.innerWidth / 2;
    let innerY = window.innerHeight / 2;
    let innerVx = 0;
    let innerVy = 0;
    const innerSpring = 0.025;  // Loosened spring pull for extreme high-inertia jelly float
    const innerDamping = 0.92;  // Soft, viscous liquid drag coefficient (smoothly glides longer)
    const innerMass = 1.60;     // Extra heavy mass weight for luxurious overshoots
    const innerGravity = 0.03;  // Subtle resting gravity drop

    // 3D Parallax Tilt state structures (Oil-dampened interpolation logic)
    const tiltState = {
        'crazy-cars': { x: 0, y: 0, targetX: 0, targetY: 0 },
        'fortzone': { x: 0, y: 0, targetX: 0, targetY: 0 },
        'hollow-knight': { x: 0, y: 0, targetX: 0, targetY: 0 }
    };

    // ==============================================================================
    // ADVANCED WEB AUDIO API SYNTHESIZER
    // ==============================================================================
    class PortalSynth {
        constructor() {
            this.ctx = null;
        }
        init() {
            if (!this.ctx) {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }
        playHover() {
            this.init();
            if (!this.ctx || isSessionActive) return;
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(120, this.ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(350, this.ctx.currentTime + 0.35);
            
            gain.gain.setValueAtTime(0.04, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.35);
            
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.start();
            osc.stop(this.ctx.currentTime + 0.35);
        }
        playClick() {
            this.init();
            if (!this.ctx || isSessionActive) return;
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(450, this.ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(50, this.ctx.currentTime + 0.45);
            
            gain.gain.setValueAtTime(0.08, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.45);
            
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.start();
            osc.stop(this.ctx.currentTime + 0.45);
        }
    }
    const synth = new PortalSynth();

    // ==============================================================================
    // ANIMATED INTRO SPLASH SEQUENCE
    // ==============================================================================
    const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

    async function runSplashSequence() {
        const splashContainer = document.getElementById('splash-container');
        if (!splashContainer) return;

        await sleep(300);
        
        const splash1 = document.getElementById('splash-1');
        if (splash1) splash1.classList.add('active');
        await sleep(2500);
        if (splash1) splash1.classList.remove('active');
        await sleep(600);
        
        const splash2 = document.getElementById('splash-2');
        if (splash2) splash2.classList.add('active');
        await sleep(2000);
        if (splash2) splash2.classList.remove('active');
        await sleep(600);
        
        const splash3 = document.getElementById('splash-3');
        if (splash3) splash3.classList.add('active');
        await sleep(2000);
        if (splash3) splash3.classList.remove('active');
        await sleep(800);

        splashContainer.style.opacity = '0';
        await sleep(1000);
        splashContainer.style.display = 'none';
        splashSequenceDone = true;
    }

    // ==============================================================================
    // THEME CONTROLLER
    // ==============================================================================
    function applyTheme(themeName) {
        synth.playClick();
        document.body.className = `theme-${themeName}`;
        document.querySelectorAll('.theme-dot').forEach(dot => {
            dot.classList.remove('active');
            if (dot.classList.contains(`dot-${themeName}`)) dot.classList.add('active');
        });
    }

    // ==============================================================================
    // 3D GLASS PERSPECTIVE PARALLAX TILT
    // ==============================================================================
    document.querySelectorAll('.game-tile').forEach(card => {
        const gameId = card.getAttribute('data-game');
        
        card.addEventListener('mousemove', (e) => {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const xc = rect.width / 2;
            const yc = rect.height / 2;
            
            tiltState[gameId].targetX = (yc - y) / 12; 
            tiltState[gameId].targetY = (x - xc) / 12;
        });
        
        card.addEventListener('mouseleave', () => {
            tiltState[gameId].targetX = 0;
            tiltState[gameId].targetY = 0;
        });
    });

    // Update 3D transforms weightily inside animation frame loop
    function updateCardTilts() {
        if (isSessionActive) {
            requestAnimationFrame(updateCardTilts);
            return;
        }

        document.querySelectorAll('.game-tile').forEach(card => {
            const gameId = card.getAttribute('data-game');
            const state = tiltState[gameId];
            if (state) {
                // Soft liquid interpolation
                state.x += (state.targetX - state.x) * 0.05;
                state.y += (state.targetY - state.y) * 0.05;
                
                // Lift translateY state smoothly based on hover distance
                const hoverOffset = Math.max(0, Math.abs(state.x) + Math.abs(state.y)) * -0.8;
                card.style.transform = `rotateX(${state.x}deg) rotateY(${state.y}deg) translateY(${hoverOffset - 4}px)`;
            }
        });
        document.body.style.setProperty('--cursor-x', `${innerX}px`);
        document.body.style.setProperty('--cursor-y', `${innerY}px`);
        requestAnimationFrame(updateCardTilts);
    }
    requestAnimationFrame(updateCardTilts);

    // ==============================================================================
    // REAL-TIME REFRACTIVE FLUID SURFACE WAVE SIMULATION (THERAPEUTIC BACKGROUND)
    // ==============================================================================
    const bgCanvas = document.getElementById('bg-canvas');
    const bgCtx = bgCanvas.getContext('2d');
    
    function resizeBgCanvas() {
        bgCanvas.width = window.innerWidth;
        bgCanvas.height = window.innerHeight;
        initFluidSim();
    }
    window.addEventListener('resize', resizeBgCanvas);

    // Fluid height-map grid parameters
    let gridCols, gridRows;
    const spacing = 40;
    let heightMapCurrent = [];
    let heightMapPrevious = [];
    const dampening = 0.975; // Smooth ripple decay factor

    function initFluidSim() {
        gridCols = Math.ceil(bgCanvas.width / spacing) + 1;
        gridRows = Math.ceil(bgCanvas.height / spacing) + 1;
        
        heightMapCurrent = new Float32Array(gridCols * gridRows);
        heightMapPrevious = new Float32Array(gridCols * gridRows);
    }
    resizeBgCanvas();

    function updateFluidWaves() {
        for (let i = 1; i < gridCols - 1; i++) {
            for (let j = 1; j < gridRows - 1; j++) {
                const index = i + j * gridCols;
                
                // Classic Wave Propagation Equation
                const left = heightMapCurrent[(i - 1) + j * gridCols];
                const right = heightMapCurrent[(i + 1) + j * gridCols];
                const up = heightMapCurrent[i + (j - 1) * gridCols];
                const down = heightMapCurrent[i + (j + 1) * gridCols];
                
                let val = (left + right + up + down) / 2.0 - heightMapPrevious[index];
                val *= dampening;
                heightMapPrevious[index] = val;
            }
        }
        
        // Swap wave-field buffers
        const temp = heightMapCurrent;
        heightMapCurrent = heightMapPrevious;
        heightMapPrevious = temp;
    }

    function renderBgGrid() {
        if (isSessionActive) {
            requestAnimationFrame(renderBgGrid);
            return;
        }

        // Apply mouse movement fluid displacement forces
        if (splashSequenceDone) {
            const gridX = Math.min(gridCols - 2, Math.max(1, Math.floor(targetMouseX / spacing)));
            const gridY = Math.min(gridRows - 2, Math.max(1, Math.floor(targetMouseY / spacing)));
            const index = gridX + gridY * gridCols;

                            }).catch((message) => { alert(message); });
                        };
                        document.body.appendChild(script);
                    })();
                <\/script>
            </body>
            </html>
        `
    };

    function deployGame(gameKey) {
        activeGameType = gameKey;
        isSessionActive = true; // Pause dashboard canvas logic and custom cursor tracking to maximize performance
        
        document.getElementById('active-game-container').style.display = 'block';
        
        const frame = document.getElementById('game-frame');
        frame.srcdoc = GAME_SOURCES[gameKey];
    }

    function terminateSession() {
        isSessionActive = false; // Resume dashboard custom cursor & background warp loops
        
        const frame = document.getElementById('game-frame');
        frame.removeAttribute('srcdoc');
        frame.src = "about:blank";
        document.getElementById('active-game-container').style.display = 'none';
    }

    // Run portal sequences
    runSplashSequence().then(() => {
        syncCursorListeners();
    });
    </script>
  
</body></html>
